<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>Zenflow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
  html, body { height: 100%; margin: 0; padding: 0; background: #0a0a14; overflow: hidden; }
  #root { height: 100%; height: 100dvh; }
  * { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; }
  #loading {
    position: fixed; inset: 0; background: #0a0a14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 99999; font-family: sans-serif; color: #f0f0f8;
  }
  .ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid #10b98130;
    border-top-color: #10b981;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="ring"></div>
  <div style="font-size:18px;font-weight:700;letter-spacing:-0.5px">Zenflow</div>
  <div style="font-size:12px;color:#6060a0;margin-top:6px">Loading...</div>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="app.js"></script>
<script>
document.getElementById('loading').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(window.ZenflowApp));
</script>
</body>
</html>
